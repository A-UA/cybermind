version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: cybermind
      MYSQL_PASSWORD: cybermind123
      MYSQL_DATABASE: cybermind
      JWT_SECRET_KEY: dev-jwt-secret-key-for-local-development-only
